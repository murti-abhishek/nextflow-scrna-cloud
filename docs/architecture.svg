<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- YOUR MAC -->
<rect x="20" y="20" width="180" height="130" rx="12" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="110" y="44" text-anchor="middle" fill="#444441">Your Mac</text>
<text font-family="Arial" font-size="12" x="110" y="60" text-anchor="middle" fill="#5F5E5A">control plane only</text>
<rect x="36" y="68" width="148" height="26" rx="6" fill="#B4B2A9" stroke="#888780" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="110" y="85" text-anchor="middle" fill="#2C2C2A">nextflow run main.nf</text>
<rect x="36" y="102" width="148" height="26" rx="6" fill="#B4B2A9" stroke="#888780" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="110" y="119" text-anchor="middle" fill="#2C2C2A">-profile aws</text>

<!-- Arrow: Mac → Seqera -->
<line x1="110" y1="150" x2="110" y2="188" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text font-family="Arial" font-size="11" x="118" y="172" fill="#5F5E5A">monitor</text>

<!-- SEQERA PLATFORM -->
<rect x="36" y="192" width="148" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="110" y="210" text-anchor="middle" fill="#085041">Seqera Platform</text>
<text font-family="Arial" font-size="12" x="110" y="226" text-anchor="middle" fill="#0F6E56">run dashboard + logs</text>

<!-- Arrow: Mac → AWS Batch -->
<line x1="200" y1="72" x2="270" y2="72" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="11" x="232" y="64" text-anchor="middle" fill="#5F5E5A">submit jobs</text>

<!-- AWS CLOUD BOX -->
<rect x="268" y="20" width="392" height="440" rx="14" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="464" y="46" text-anchor="middle" fill="#042C53">AWS Cloud</text>

<!-- AWS BATCH -->
<rect x="284" y="56" width="160" height="100" rx="10" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="364" y="78" text-anchor="middle" fill="#042C53">AWS Batch</text>
<text font-family="Arial" font-size="12" x="364" y="96" text-anchor="middle" fill="#0C447C">job queue</text>
<text font-family="Arial" font-size="12" x="364" y="112" text-anchor="middle" fill="#0C447C">nextflow-batch-queue</text>
<text font-family="Arial" font-size="12" x="364" y="128" text-anchor="middle" fill="#0C447C">compute env</text>
<text font-family="Arial" font-size="12" x="364" y="144" text-anchor="middle" fill="#0C447C">spot · x86 · max 256 vCPU</text>

<!-- Arrow: Batch → EC2 -->
<line x1="364" y1="156" x2="364" y2="196" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="11" x="372" y="178" fill="#0C447C">spin up</text>

<!-- EC2 SPOT INSTANCES -->
<rect x="284" y="200" width="356" height="160" rx="10" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
