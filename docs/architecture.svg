<!-- Instance 1 -->
<rect x="298" y="232" width="152" height="116" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="374" y="252" text-anchor="middle" fill="#26215C">pbmc_1k_L001</text>
<rect x="310" y="260" width="128" height="24" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="374" y="276" text-anchor="middle" fill="#3C3489">Docker container</text>
<rect x="310" y="292" width="128" height="24" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="374" y="308" text-anchor="middle" fill="#3C3489">fastqc R1 R2 --threads 1</text>
<rect x="310" y="324" width="128" height="18" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="374" y="337" text-anchor="middle" fill="#3C3489">biocontainers/fastqc</text>

<!-- Instance 2 -->
<rect x="466" y="232" width="152" height="116" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="542" y="252" text-anchor="middle" fill="#26215C">pbmc_1k_L002</text>
<rect x="478" y="260" width="128" height="24" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="542" y="276" text-anchor="middle" fill="#3C3489">Docker container</text>
<rect x="478" y="292" width="128" height="24" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="542" y="308" text-anchor="middle" fill="#3C3489">fastqc R1 R2 --threads 1</text>
<rect x="478" y="324" width="128" height="18" rx="4" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="542" y="337" text-anchor="middle" fill="#3C3489">biocontainers/fastqc</text>

<!-- Parallel label -->
<text font-family="Arial" font-size="12" font-style="italic" x="462" y="366" text-anchor="middle" fill="#3C3489">run in parallel simultaneously</text>

<!-- Arrows: instances → S3 -->
<line x1="374" y1="392" x2="374" y2="416" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="542" y1="392" x2="542" y2="416" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<!-- S3 BUCKET -->
<rect x="284" y="420" width="356" height="120" rx="10" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="462" y="444" text-anchor="middle" fill="#412402">S3  nextflow-scrna-abhishek</text>
<rect x="298" y="454" width="100" height="32" rx="6" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="348" y="468" text-anchor="middle" fill="#412402">raw/</text>
<text font-family="Arial" font-size="12" x="348" y="482" text-anchor="middle" fill="#412402">input FASTQs</text>
<rect x="410" y="454" width="100" height="32" rx="6" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="460" y="468" text-anchor="middle" fill="#412402">work/</text>
<text font-family="Arial" font-size="12" x="460" y="482" text-anchor="middle" fill="#412402">intermediate files</text>
<rect x="522" y="454" width="104" height="32" rx="6" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="Arial" font-size="12" x="574" y="468" text-anchor="middle" fill="#412402">results/</text>
<text font-family="Arial" font-size="12" x="574" y="482" text-anchor="middle" fill="#412402">.html .zip reports</text>

<!-- Read arrow S3 → instances -->
<path d="M462 420 L462 380" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="Arial" font-size="11" x="470" y="404" fill="#633806">read input</text>

<!-- Terminate labels -->
<text font-family="Arial" font-size="12" x="462" y="512" text-anchor="middle" fill="#412402">instances terminate automatically after each job</text>
<text font-family="Arial" font-size="12" x="462" y="528" text-anchor="middle" fill="#412402">you only pay for runtime · spot = ~70% cheaper than on-demand</text>

<!-- WAVE -->
<rect x="460" y="56" width="184" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="552" y="74" text-anchor="middle" fill="#085041">Wave (Seqera)</text>
<text font-family="Arial" font-size="12" x="552" y="90" text-anchor="middle" fill="#0F6E56">augments containers + Fusion S3</text>
<line x1="462" y1="156" x2="462" y2="200" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- LEGEND -->
<rect x="20" y="476" width="220" height="120" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="Arial" font-size="14" font-weight="500" x="130" y="498" text-anchor="middle" fill="#2C2C2A">What runs where</text>
<text font-family="Arial" font-size="12" x="36" y="518" fill="#444441">Your Mac — Nextflow coordinator only</text>
<text font-family="Arial" font-size="12" x="36" y="536" fill="#444441">AWS Batch — job scheduling</text>
<text font-family="Arial" font-size="12" x="36" y="554" fill="#444441">EC2 Spot — actual compute</text>
<text font-family="Arial" font-size="12" x="36" y="572" fill="#444441">S3 — all data (input/work/output)</text>
<text font-family="Arial" font-size="12" x="36" y="590" fill="#444441">Wave — container + filesystem layer</text>
</svg>
